# docker/docker-compose.hardened.yml — Security hardening overlay.
#
# Always included by the installer. Adds security restrictions, resource
# limits, log rotation, and Consul ACL enforcement to all services.
#
# Usage (always layer on top of base compose):
#   docker compose -f docker-compose.yml -f docker-compose.hardened.yml up -d

services:
  timescaledb:
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      # PostgreSQL needs these capabilities
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
        reservations:
          cpus: "0.25"
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  consul:
    # Enable ACLs with deny-by-default policy.
    # Tokens must be provisioned before any KV operations succeed.
    # Consul 1.22+ removed -acl-* CLI flags — use CONSUL_LOCAL_CONFIG JSON.
    # The entrypoint writes this to /consul/config/local.json so that path
    # must be writable (tmpfs satisfies this while keeping the container
    # otherwise read-only).
    command: ["consul", "agent", "-dev", "-client=[::]"]
    environment:
      CONSUL_LOCAL_CONFIG: '{"acl":{"enabled":true,"default_policy":"deny"}}'
    tmpfs:
      - /consul/config:mode=0755
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      # Consul entrypoint chowns /consul dirs, then su-exec switches user
      - CHOWN
      - SETGID
      - SETUID
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
        reservations:
          cpus: "0.1"
          memory: 64m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  consul-init:
    # With ACLs enabled, consul-init needs the CONSUL_HTTP_TOKEN to write
    # to Consul KV. On first deploy this token doesn't exist yet —
    # consul-init will fail and the installer re-runs it after ACL bootstrap.
    restart: "no"
    environment:
      CONSUL_HTTP_TOKEN: ${CONSUL_HTTP_TOKEN:-}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  traefik:
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
        reservations:
          cpus: "0.1"
          memory: 64m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  proxy:
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g
        reservations:
          cpus: "0.25"
          memory: 128m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
