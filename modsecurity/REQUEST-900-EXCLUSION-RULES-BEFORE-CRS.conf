# REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf
# Per-path CRS rule exclusions for llm-api-proxy.
#
# LLM API endpoints (/v1/*) carry arbitrary natural language, code, and
# markup in JSON payloads. Content-inspection rules (SQLi, XSS, RCE etc.)
# produce false positives on these prompts. Disable them for /v1/* while
# keeping full CRS protection on /manage/v1/* and /dashboard/*.

# LLM API endpoints — disable content-inspection rules
SecRule REQUEST_URI "^/v1/" \
  "id:1000,phase:1,pass,nolog,\
   ctl:ruleRemoveById=930000-930999,\
   ctl:ruleRemoveById=931000-931999,\
   ctl:ruleRemoveById=932000-932999,\
   ctl:ruleRemoveById=933000-933999,\
   ctl:ruleRemoveById=934000-934999,\
   ctl:ruleRemoveById=941000-941999,\
   ctl:ruleRemoveById=942000-942999,\
   ctl:ruleRemoveById=943000-943999,\
   ctl:ruleRemoveById=944000-944999"

# LLM API endpoints — relax body size limits (920340-920344)
SecRule REQUEST_URI "^/v1/" \
  "id:1001,phase:1,pass,nolog,\
   ctl:ruleRemoveById=920340-920344"
