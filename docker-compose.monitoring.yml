# docker/docker-compose.monitoring.yml — Prometheus + Grafana monitoring overlay.
#
# Adds Prometheus and Grafana on the proxy_net bridge network.
# Both are served via Traefik subpath routing:
#   /grafana    → Grafana (port 3000)
#   /prometheus → Prometheus (port 9090)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d

services:
  prometheus:
    image: prom/prometheus:v3.4.0
    networks:
      - proxy_net
    ports:
      - "[::1]:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.external-url=/prometheus"
      - "--web.route-prefix=/prometheus"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/prometheus/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    labels:
      - traefik.enable=true
      - "traefik.http.routers.prometheus.rule=PathPrefix(`/prometheus`)"
      - traefik.http.routers.prometheus.entrypoints=websecure
      - traefik.http.routers.prometheus.service=prometheus-backend
      - "traefik.http.services.prometheus-backend.loadbalancer.server.url=http://[::1]:9090"

  grafana:
    image: grafana/grafana:11.6.0
    networks:
      - proxy_net
    ports:
      - "[::1]:${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    labels:
      - traefik.enable=true
      - "traefik.http.routers.grafana.rule=PathPrefix(`/grafana`)"
      - traefik.http.routers.grafana.entrypoints=websecure
      - traefik.http.routers.grafana.service=grafana-backend
      - "traefik.http.services.grafana-backend.loadbalancer.server.url=http://[::1]:3000"

volumes:
  prometheus_data:
  grafana_data:
