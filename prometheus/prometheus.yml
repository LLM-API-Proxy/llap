# docker/prometheus/prometheus.yml — Prometheus scrape configuration.
#
# Prometheus runs on the proxy_net bridge. Host-networked services
# (proxy, traefik) are reached via the Docker bridge gateway.
# The monitoring overlay sets extra_hosts: host.docker.internal:host-gateway
# which resolves to the Docker bridge gateway IP on Linux.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'llm-api-proxy'

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Proxy metrics — host-networked, reached via Docker gateway
  - job_name: 'proxy-server'
    scrape_interval: 10s
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:7080']
        labels:
          service: 'proxy-server'

  # Traefik metrics — host-networked, reached via Docker gateway
  - job_name: 'traefik'
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8082']
        labels:
          service: 'traefik'
