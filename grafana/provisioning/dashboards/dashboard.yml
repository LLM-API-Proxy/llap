# docker/grafana/provisioning/dashboards/dashboard.yml
# Grafana dashboard provider configuration.

apiVersion: 1

providers:
  - name: 'llm-api-proxy'
    orgId: 1
    folder: 'LLM API Proxy'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards
